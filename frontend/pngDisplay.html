<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>Generated Worksheet</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 10px;
            padding-bottom: 5px;
            background: #dcb4ec;
        }
        h1 { margin-bottom: 10px; }
        #pngContainer {
            margin: 20px auto;
            max-width: 820px;
        }
        #worksheetImg {
            width: 100%;
            max-width: 794px;
            height: auto;
            border: 3px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        #errorMsg {
            color: #c00;
            font-size: 18px;
            margin-top: 40px;
            display: none;
        }
        button {
            margin: 10px;
            height: 75%;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            background-color: #e6e7e4;
        }
        #Buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px 0;
        }
        #mainContainer {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: flex-start;
            flex-wrap: nowrap;
            max-width: 1400px;
            margin-left: 100px;
            margin-right: 400px auto;
        }
        </style>
    </head>
    <body>
        <h1 style = "font-size: 35px"><b><i>Your worksheet!</i></b></h1>
        <div id="pngContainer">
            <img id="worksheetImg" alt="Generated sound out worksheet">
            <p id="errorMsg">
                No PNG found. Please go back and generate a worksheet first.
            </p>
    <div id="Buttons">
        <button onclick="downloadPNG()">💾<b>Download PNG</b>🎨<br><b>ダウンロード</b></button>
        <button onclick="location.href='/frontend/resultsPage.html'">🖉<b>Edit / Change Design</b><br><b>編集やデザイン変わるへ</b></button>
        <button onclick="location.href='/frontend/userInput.html'">🔄<b>New Words</b><br><b>また入力へ</b></button>
        <button onclick="location.href='/frontend/welcomePage.html'">🏠<b>Home</b><br><b>ホームページへ</b></button>
    </div>

    <script>
        const blobUrl = sessionStorage.getItem("pngBlobURL");
        const img     = document.getElementById("worksheetImg");
        const errMsg  = document.getElementById("errorMsg");

        if (blobUrl) {
            img.src = blobUrl;
            img.style.display = "block";
        } else {
            img.style.display = "none";
            errMsg.style.display = "block";
        }

        function downloadPNG() {
            if (!blobUrl) {
                alert("No PNG to download. Please generate a worksheet first.");
                return;
            }
            const a = document.createElement("a");
            a.href = blobUrl;
            a.download = "soundout_worksheet.png";
            a.click();
        }
    </script>
</body>
</html>
