<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generated Words</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #dcb4ec;
        }
        #worksheetContent {
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            text-align: left;
            white-space: pre-wrap;
            border: 3px solid #ccc;
            font-size: 18px;
            line-height: 2;
            margin-top: 100px;
            border-radius: 10px;
        }
        button {
            margin: 10px;
            height: 75%;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            background-color: #e6e7e4;
        }   
        #mainContainer {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
            max-width: 1400px;
            margin: 0 auto;  
        }
        #worksheetSection {
            flex: 1;
            min-width: 350px;
            max-width: 750px;
        }
        #designSection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex;
        }
        .designOption {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .designOption input {
            margin: 0;
            cursor: pointer;
        }
        .designOption img {
            width: 200px;
            height: auto;
            border: 2px solid #ccc;
            border-radius: 10px;
            transition: border-color 0.2s;

        }
        .designOption input:checked ~ div img,
        .designOption:has(input:checked) img {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px #c4b5fd;
        }
        #buttonRow {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        #pokemonNames{
            font-size: 15px;
        }
    </style>
</head>
<body>
    <h1 style = "font-size: 35px"><b><i>Sound Out Activity</i></b></h1>

    <div id="mainContainer">
        <div id = "worksheetSection">
            <div id="worksheetContent">Loading...</div>
        </div>

        <div id="designSection">
            <h3>Select your design:</h3>
            <label class = "designOption">
                <input type="radio" name="design" value="styleBulb" checked>
                <div>
                    <strong id="pokemonNames">Bulbasaur / フシギダネ</strong><br>
                    <img src="../png/soundoutActivityBulbasaur.png" alt="Bublasaur Design" widgth="250">
                </div>
            </label>

            <label class = "designOption">
                <input type="radio" name="design" value="styleCharmander">
                <div>
                    <strong id="pokemonNames">Charmander / ヒトカゲ</strong><br>
                    <img src="../png/soundoutActivityCharmander.png" alt="Charmander Design" width="250">
                </div>
            </label>

            <label class = "designOption">
                <input type="radio" name="design" value="styleSquirtle">
                <div>
                    <strong id="pokemonNames">Squirtle / ゼニガメ</strong><br>
                    <img src="../png/soundoutActivitySquirtle.png" alt="Squirtle Design" width="250">
                </div>
            </label>
        </div>
    </div>
        <div>
            <button onclick="downloadWorksheet()">💾<b>Download as Text</b><br><i>テキストファイルで保存</i></button>
            <button onclick="editWorksheet()">🖉<b>Edit</b><br><i>編集</i></button>
            <button onclick="location.href='/frontend/userInput.html'">🔄<b>Back to Input</b><br><i>入力へ</i></button>
            <button id="generateBtn" onclick="generatePNG()">⏩<b>Generate PNG</b>🎨<br><i>ワークシートに反絵</i></button>
            <button onclick="location.href='/frontend/welcomePage.html'">🏠<b>Home</b><br><i>ホームページへ</i></button>
        </div>
    <script src="/frontend/inputHandler.js"></script>
    <script>
        //load workheet from session storage
        const worksheet = sessionStorage.getItem("worksheet") || "No worksheet generated.";
        sessionStorage.setItem("hasEdits", "true");
        document.getElementById("worksheetContent").textContent = worksheet;

        // editing logic
        let isEditing = false;
        let hasEdits = false;
        
        function editWorksheet() {
            const worksheetDiv = document.getElementById("worksheetContent");
            const editButton = document.querySelector("button[onclick='editWorksheet()']");

            if (!isEditing){
                worksheetDiv.contentEditable = true;
                worksheetDiv.style.backgroundColor = "#ffffcc"
                worksheetDiv.style.border = "2px dashed #007BFF";
                editButton.style.backgroundColor = "#75da96"
                editButton.innerHTML = "✓<b>Save</b><br><i>セーブ</i>";
                isEditing = true;
            } else {
                worksheetDiv.contentEditable = false;
                worksheetDiv.style.backgroundColor = "#f5f5f5";
                worksheetDiv.style.border = "1px solid #ccc";
                editButton.style.backgroundColor = "#e6e7e4"
                editButton.innerHTML = "🖉<b>Edit</b><br><i>編集</i>";
                isEditing = false;
                sessionStorage.setItem("worksheet", worksheetDiv.textContent);
                hasEdits = true;
            }
        }
        
        function downloadWorksheet() {
            const text = sessionStorage.getItem("worksheet") || "";
            const element = document.createElement("a");
            element.href = "data:text/plain;charset=utf-8," + encodeURIComponent(text);
            element.download = "soundout_activity.txt";
            element.style.display = "none";
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

    </script>
</body>
</html>
