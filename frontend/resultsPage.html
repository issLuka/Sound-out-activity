<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generated Worksheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #worksheetContent {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            text-align: left;
            white-space: pre-wrap;
            border: 1px solid #ccc;
            font-size: 18px;
            line-height: 2;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Your Sound Out Activity</h1>
    <div id="worksheetContent">Loading...</div>
    
    <button onclick="downloadWorksheet()">Download as Text</button>
    <button onclick="printWorksheet()">Print</button>
    <button onclick="location.href='/frontend/userInput.html'">Back to Input</button>
    <button onclick="location.href='/frontend/welcomePage.html'">Back to Home</button>

    <script>
        const worksheet = sessionStorage.getItem("worksheet") || "No worksheet generated.";
        document.getElementById("worksheetContent").textContent = worksheet;

        function downloadWorksheet() {
            const element = document.createElement("a");
            element.setAttribute("href", "data:text/plain;charset=utf-8," + encodeURIComponent(worksheet));
            element.setAttribute("download", "soundout_activity.txt");
            element.style.display = "none";
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function printWorksheet() {
            window.print();
        }
    </script>
</body>
</html>
